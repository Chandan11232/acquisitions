name: Docker Build and Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    environment: production # Add this if your secret is inside an environment
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/devops-kubernetes-api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate production timestamp tag
        id: prod_timestamp
        run: echo "value=prod-$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest
            type=raw,value=${{ steps.prod_timestamp.outputs.value }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Add Docker publish summary
        if: success()
        run: |
          {
            echo "## Docker Publish Summary"
            echo "- Image: \`${{ env.IMAGE_NAME }}\`"
            echo "- Platforms: \`linux/amd64, linux/arm64\`"
            echo "- Published tags:"
            while IFS= read -r tag; do
              if [[ -n "$tag" ]]; then
                echo "  - \`$tag\`"
              fi
            done <<< "${{ steps.meta.outputs.tags }}"
          } >> "$GITHUB_STEP_SUMMARY"
