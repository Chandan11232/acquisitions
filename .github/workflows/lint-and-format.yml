name: Lint and Format

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

permissions:
  contents: read

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: npm run lint

      - name: Run Prettier check
        id: prettier
        continue-on-error: true
        run: npm run format:check

      - name: Annotate ESLint issues
        if: steps.eslint.outcome == 'failure'
        run: |
          echo "::error title=ESLint failed::Lint issues were detected. Run 'npm run lint:fix' locally, commit the fixes, and push again."

      - name: Annotate Prettier issues
        if: steps.prettier.outcome == 'failure'
        run: |
          echo "::error title=Prettier check failed::Formatting issues were detected. Run 'npm run format' locally, commit the changes, and push again."

      - name: Add workflow summary
        if: always()
        run: |
          {
            echo "## Lint and Format Summary"
            if [[ "${{ steps.eslint.outcome }}" == "success" ]]; then
              echo "- ✅ ESLint passed"
            else
              echo "- ❌ ESLint failed (fix with \`npm run lint:fix\`)"
            fi
            if [[ "${{ steps.prettier.outcome }}" == "success" ]]; then
              echo "- ✅ Prettier check passed"
            else
              echo "- ❌ Prettier check failed (fix with \`npm run format\`)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any check failed
        if: steps.eslint.outcome == 'failure' || steps.prettier.outcome == 'failure'
        run: exit 1
