name: Tests

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      NODE_OPTIONS: --experimental-vm-modules
      DATABASE_URL: ${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/testdb' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: test_run
        continue-on-error: true
        run: npm test 2>&1 | tee test-output.log

      - name: Annotate test failures
        if: steps.test_run.outcome == 'failure'
        run: |
          echo "::error title=Tests failed::One or more tests failed. Review the test logs and fix the failing suites."
          while IFS= read -r line; do
            echo "::error title=Failed test suite::$line"
          done < <(grep -E "^FAIL " test-output.log || true)

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: warn
          retention-days: 30

      - name: Add test summary
        if: always()
        run: |
          {
            echo "## Test Workflow Summary"
            if [[ "${{ steps.test_run.outcome }}" == "success" ]]; then
              echo "- ✅ npm test passed"
            else
              echo "- ❌ npm test failed"
            fi
            if [[ -d coverage ]]; then
              echo "- 📦 Coverage directory found and uploaded as \`coverage-report\`"
            else
              echo "- ⚠️ Coverage directory was not found"
            fi
            echo ""
            echo "### Jest output snapshot"
            grep -E "Test Suites:|Tests:|Snapshots:|Time:" test-output.log || echo "No Jest summary lines found."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if tests failed
        if: steps.test_run.outcome == 'failure'
        run: exit 1
