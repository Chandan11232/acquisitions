services:
  neon-local:
    image: neondatabase/neon_local:latest
    container_name: acquisitions-neon-local
    ports:
      - '5432:5432'
    env_file:
      - .env.development
    restart: unless-stopped
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: acquisitions-app-dev
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    env_file:
      - .env.development
    depends_on:
      - neon-local
    command: npm run dev
    restart: unless-stopped
